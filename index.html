<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webeder 3D Hero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 40%, #1a1a12 0%, #0c0c08 55%, #050503 100%);
    font-family: 'Outfit', 'DM Sans', system-ui, sans-serif;
  }
  #scene { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  #loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #D4A573; letter-spacing: 3px; font-size: 12px; text-transform: uppercase;
    transition: opacity 0.8s ease; z-index: 5; pointer-events: none;
  }
  #loader.hidden { opacity: 0; }
  .ring {
    width: 34px; height: 34px; margin-right: 14px; border-radius: 50%;
    border: 2px solid rgba(212,165,115,0.25); border-top-color: #D4A573;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="loader"><div class="ring"></div>Loading experience</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // ---- Palette (matches Webeder brand) ----
  const GOLD = 0xD4A573;
  const GOLD_DEEP = 0xb8860b;
  const CYAN = 0x3fe0ff;
  const CYAN_SOFT = 0x2ec9ff;

  const canvas = document.getElementById('scene');
  const loaderEl = document.getElementById('loader');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x060604, 1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060604, 0.028);

  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  const CAM_BASE = new THREE.Vector3(0, 1.1, 8.2);
  camera.position.copy(CAM_BASE);
  camera.lookAt(0, 0.6, 0);

  // ---- Lighting: warm gold + cool blue volumetric-style ----
  scene.add(new THREE.AmbientLight(0x2a2620, 0.9));

  const keyLight = new THREE.SpotLight(0xffd9a0, 90, 40, Math.PI / 5, 0.5, 1.4);
  keyLight.position.set(5, 8, 5);
  keyLight.target.position.set(0, 0, 0);
  scene.add(keyLight, keyLight.target);

  const rimLight = new THREE.SpotLight(CYAN, 60, 40, Math.PI / 4, 0.6, 1.2);
  rimLight.position.set(-6, 4, -3);
  rimLight.target.position.set(0, 1.5, 0);
  scene.add(rimLight, rimLight.target);

  const fillLight = new THREE.PointLight(0xffb060, 12, 25, 2);
  fillLight.position.set(0, 0.5, 4);
  scene.add(fillLight);

  const holoPointLight = new THREE.PointLight(CYAN, 6, 12, 2);
  holoPointLight.position.set(0, 2.6, 0);
  scene.add(holoPointLight);

  // ---- Ground reflective-ish surface (the desk) ----
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0a, roughness: 0.55, metalness: 0.5 });
  const ground = new THREE.Mesh(new THREE.CircleGeometry(30, 64), groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1.15;
  scene.add(ground);

  // ---- Procedural key builder (fallback + shape reference) ----
  function buildKeyGeometryGroup() {
    const g = new THREE.Group();
    // Bow (ring/handle)
    const bow = new THREE.Mesh(new THREE.TorusGeometry(0.72, 0.17, 24, 64));
    bow.position.set(0, 1.35, 0);
    g.add(bow);
    // inner decorative ring
    const bow2 = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.07, 18, 48));
    bow2.position.set(0, 1.35, 0);
    g.add(bow2);
    // Shaft
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 2.5, 24));
    shaft.position.set(0, -0.05, 0);
    g.add(shaft);
    // Collar
    const collar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.18, 24));
    collar.position.set(0, 0.55, 0);
    g.add(collar);
    // Tip
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.14, 20, 20));
    tip.position.set(0, -1.32, 0);
    g.add(tip);
    // Teeth (bit)
    const toothDims = [[0.34, 0.26], [0.5, 0.22], [0.28, 0.22]];
    let ty = -0.55;
    toothDims.forEach(([w, h]) => {
      const t = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.16));
      t.position.set(0.13 + w / 2, ty, 0);
      g.add(t);
      ty -= (h + 0.12);
    });
    return g;
  }

  function applyMaterial(group, material) {
    group.traverse((c) => { if (c.isMesh) c.material = material; });
    return group;
  }

  // Golden material
  const goldMat = new THREE.MeshStandardMaterial({
    color: GOLD, metalness: 1.0, roughness: 0.28,
    emissive: GOLD_DEEP, emissiveIntensity: 0.12
  });

  // Holographic material (glowing translucent)
  const holoMat = new THREE.MeshStandardMaterial({
    color: CYAN, emissive: CYAN, emissiveIntensity: 2.6,
    metalness: 0.1, roughness: 0.3, transparent: true, opacity: 0.55,
    depthWrite: false, blending: THREE.AdditiveBlending
  });
  const holoWireMat = new THREE.MeshBasicMaterial({
    color: CYAN_SOFT, wireframe: true, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false
  });

  // Containers
  const goldenKey = new THREE.Group();      // sits on desk
  const holoKey = new THREE.Group();         // floats above
  scene.add(goldenKey, holoKey);

  goldenKey.position.set(0, -0.55, 0);
  goldenKey.rotation.z = -Math.PI / 2 + 0.12; // lie mostly flat / tilted
  goldenKey.rotation.x = -0.35;
  goldenKey.scale.setScalar(1.05);

  holoKey.position.set(0, 2.5, 0);
  holoKey.scale.setScalar(1.15);

  // ---- Try loading real Tripo3D GLBs, else procedural fallback ----
  const gltfLoader = new GLTFLoader();
  let assetsToLoad = 2, assetsDone = 0;
  function markDone() {
    assetsDone++;
    if (assetsDone >= assetsToLoad) loaderEl.classList.add('hidden');
  }

  function fitInto(container, object, targetHeight) {
    const box = new THREE.Box3().setFromObject(object);
    const size = new THREE.Vector3(); box.getSize(size);
    const center = new THREE.Vector3(); box.getCenter(center);
    object.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    object.scale.multiplyScalar(targetHeight / maxDim);
    container.add(object);
  }

  // Golden key: GLB or procedural
  gltfLoader.load('models/golden-key.glb',
    (gltf) => {
      const m = gltf.scene;
      m.traverse((c) => { if (c.isMesh) { c.material.metalness = 1.0; c.material.roughness = 0.3; } });
      fitInto(goldenKey, m, 3.2);
      markDone();
    },
    undefined,
    () => { // fallback
      const g = applyMaterial(buildKeyGeometryGroup(), goldMat);
      goldenKey.add(g);
      markDone();
    }
  );

  // Holographic key: GLB or procedural
  gltfLoader.load('models/holo-key.glb',
    (gltf) => {
      const m = gltf.scene;
      const wire = m.clone(true);
      m.traverse((c) => { if (c.isMesh) c.material = holoMat; });
      wire.traverse((c) => { if (c.isMesh) c.material = holoWireMat; });
      const wrap = new THREE.Group(); wrap.add(m, wire);
      fitInto(holoKey, wrap, 2.8);
      markDone();
    },
    undefined,
    () => {
      const solid = applyMaterial(buildKeyGeometryGroup(), holoMat);
      const wire = applyMaterial(buildKeyGeometryGroup(), holoWireMat);
      holoKey.add(solid, wire);
      markDone();
    }
  );

  // Safety: hide loader after 6s no matter what
  setTimeout(() => loaderEl.classList.add('hidden'), 6000);

  // ---- Particles: gold + cyan drifting upward ----
  function makeParticles(count, color, spread, size, speed) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const vel = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      pos[i*3]   = (Math.random() - 0.5) * spread;
      pos[i*3+1] = (Math.random() - 0.5) * spread * 0.8;
      pos[i*3+2] = (Math.random() - 0.5) * spread;
      vel[i] = 0.15 + Math.random() * speed;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      color, size, transparent: true, opacity: 0.75,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
    });
    const pts = new THREE.Points(geo, mat);
    pts.userData.vel = vel;
    pts.userData.spread = spread;
    scene.add(pts);
    return pts;
  }
  const goldParticles = makeParticles(260, GOLD, 16, 0.05, 0.5);
  const cyanParticles = makeParticles(200, CYAN, 14, 0.045, 0.7);

  function updateParticles(pts, dt) {
    const p = pts.geometry.attributes.position;
    const vel = pts.userData.vel;
    const s = pts.userData.spread;
    for (let i = 0; i < p.count; i++) {
      let y = p.getY(i) + vel[i] * dt;
      if (y > s * 0.5) y = -s * 0.5;
      p.setY(i, y);
    }
    p.needsUpdate = true;
  }

  // ---- Post-processing bloom ----
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.9, 0.55, 0.18);
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  // ---- Mouse parallax ----
  const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  window.addEventListener('pointermove', (e) => {
    mouse.tx = (e.clientX / window.innerWidth - 0.5) * 2;
    mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  window.addEventListener('mouseleave', () => { mouse.tx = 0; mouse.ty = 0; });

  // ---- Resize ----
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    composer.setSize(w, h);
    bloom.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Animation loop ----
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;

    // Holographic key idle: rotate + bob
    holoKey.rotation.y += dt * 0.6;
    holoKey.position.y = 2.5 + Math.sin(t * 1.3) * 0.22;
    holoPointLight.position.y = holoKey.position.y;
    holoPointLight.intensity = 5 + Math.sin(t * 3) * 1.5;

    // Golden key subtle shimmer rotation
    goldenKey.rotation.y = Math.sin(t * 0.25) * 0.15;

    // Particles
    updateParticles(goldParticles, dt);
    updateParticles(cyanParticles, dt);

    // Mouse parallax (smoothed)
    mouse.x += (mouse.tx - mouse.x) * 0.05;
    mouse.y += (mouse.ty - mouse.y) * 0.05;
    camera.position.x = CAM_BASE.x + mouse.x * 1.1;
    camera.position.y = CAM_BASE.y - mouse.y * 0.7;
    camera.lookAt(0, 0.9, 0);

    composer.render();
  }
  animate();
  </script>
</body>
</html>
